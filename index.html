<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문화센터 강좌검색 링크 생성기</title>
<style>
  :root {
    --green: #023432;
    --orange: #d96b00;
    --hyundai-green: #4a675c;
    --gray-bg: #f2f2f2;
    --blue-gray: #c5ccd0;
    --black: #1a1a1a;
    --text: #222;
    --text-sub: #666;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    color: var(--text);
    background: #fff;
    margin: 0;
    padding: 40px 20px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  .header { margin-bottom: 32px; }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.12em; color: var(--green);
    font-weight: 700; text-transform: uppercase; margin-bottom: 8px;
  }
  .title { font-size: 24px; font-weight: 800; color: var(--black); margin: 0; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 6px; }

  .divider { height: 2px; background: var(--black); margin: 0 0 28px; }

  .field { margin-bottom: 22px; }
  .field-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 8px;
  }
  .field-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--green); color: #fff; font-size: 11px; font-weight: 700;
  }

  select, input[type="text"] {
    width: 100%; font-size: 14px; padding: 12px 14px;
    border: 1px solid var(--blue-gray); border-radius: 2px;
    background: #fff; color: var(--text); font-family: inherit;
    transition: border-color 0.15s;
  }
  select:focus, input[type="text"]:focus {
    outline: none; border-color: var(--green);
  }
  select:disabled { background: var(--gray-bg); color: #999; cursor: not-allowed; }

  .gen-btn {
    width: 100%; font-size: 15px; font-weight: 700; padding: 14px;
    background: var(--black); color: #fff; border: none; border-radius: 2px;
    cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
    transition: background 0.15s; margin-top: 4px;
  }
  .gen-btn:hover { background: #000; }

  .result { margin-top: 32px; display: none; }
  .result.show { display: block; animation: fade 0.25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .result-head {
    display: flex; align-items: baseline; gap: 8px;
    border-top: 1px solid var(--blue-gray); padding-top: 20px; margin-bottom: 16px;
  }
  .result-count { font-size: 15px; font-weight: 800; color: var(--green); }
  .result-meta { font-size: 12px; color: var(--text-sub); }

  .link-card {
    border: 1px solid var(--blue-gray); border-radius: 2px;
    padding: 14px 16px; margin-bottom: 12px; background: #fff;
  }
  .link-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .link-badge {
    font-size: 11px; font-weight: 700; color: #fff; background: var(--green);
    padding: 3px 9px; border-radius: 2px; letter-spacing: 0.03em;
  }
  .link-badge.mobile { background: var(--hyundai-green); }
  .link-card-body { display: flex; align-items: center; gap: 10px; }
  .link-url {
    flex: 1; font-size: 12px; color: var(--text); word-break: break-all;
    background: var(--gray-bg); padding: 9px 11px; border-radius: 2px;
    font-family: 'SF Mono', Consolas, monospace; line-height: 1.5;
  }
  .copy-btn {
    flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 9px 16px;
    background: #fff; color: var(--green); border: 1px solid var(--green);
    border-radius: 2px; cursor: pointer; font-family: inherit;
    transition: all 0.15s; white-space: nowrap; min-width: 64px;
  }
  .copy-btn:hover { background: var(--green); color: #fff; }
  .copy-btn.done { background: var(--green); color: #fff; border-color: var(--green); }
  .copy-btn:disabled { cursor: default; }

  .open-btn {
    flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 9px 16px;
    background: var(--black); color: #fff; border: 1px solid var(--black);
    border-radius: 2px; cursor: pointer; font-family: inherit;
    transition: all 0.15s; white-space: nowrap; min-width: 64px;
  }
  .open-btn:hover { background: #000; }

  .reset-row { text-align: center; margin-top: 18px; }
  .reset-btn {
    font-size: 12px; font-weight: 600; color: var(--text-sub);
    background: none; border: none; cursor: pointer; font-family: inherit;
    padding: 6px 10px; letter-spacing: 0.02em; transition: color 0.15s;
  }
  .reset-btn:hover { color: var(--green); }

  @media (max-width: 480px) {
    body { padding: 28px 16px; }
    .title { font-size: 20px; }
    .link-card-body { flex-direction: column; align-items: stretch; }
    .copy-btn, .open-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">The Hyundai Culture</div>
    <h1 class="title">문화센터 강좌검색 링크 생성기</h1>
    <p class="subtitle">카테고리와 점을 선택하고 검색어를 입력하면 PC·모바일 링크를 만들어 드립니다.</p>
  </div>
  <div class="divider"></div>

  <div class="field">
    <div class="field-label"><span class="field-num">1</span>카테고리</div>
    <select id="category" onchange="updateStores()">
      <option value="">선택하세요</option>
      <option value="CH">CH 1985</option>
      <option value="GENERAL">문화센터</option>
      <option value="CC">컬처커넥트</option>
    </select>
  </div>

  <div class="field">
    <div class="field-label"><span class="field-num">2</span>점</div>
    <select id="store" disabled>
      <option value="">카테고리를 먼저 선택하세요</option>
    </select>
  </div>

  <div class="field">
    <div class="field-label"><span class="field-num">3</span>검색 키워드</div>
    <input type="text" id="keyword" placeholder="예: 키즈  (비워두면 전체 강좌)">
  </div>

  <button class="gen-btn" onclick="generate()">링크 생성</button>

  <div class="result" id="result">
    <div class="result-head">
      <span class="result-count">생성 완료</span>
      <span class="result-meta" id="resultMeta"></span>
    </div>

    <div class="link-card">
      <div class="link-card-top"><span class="link-badge">PC</span></div>
      <div class="link-card-body">
        <span class="link-url" id="pcUrl"></span>
        <button class="copy-btn" onclick="copyUrl('pcUrl', this)">복사</button>
        <button class="open-btn" onclick="openUrl('pcUrl')">바로가기</button>
      </div>
    </div>

    <div class="link-card">
      <div class="link-card-top"><span class="link-badge mobile">모바일</span></div>
      <div class="link-card-body">
        <span class="link-url" id="mobileUrl"></span>
        <button class="copy-btn" onclick="copyUrl('mobileUrl', this)">복사</button>
        <button class="open-btn" onclick="openUrl('mobileUrl')">바로가기</button>
      </div>
    </div>

    <div class="reset-row">
      <button class="reset-btn" onclick="resetAll()">↺ 다시 만들기</button>
    </div>
  </div>
</div>

<script>
const STORE_ORDER = [
  "본점","무역센터","천호","신촌","미아","목동","중동","킨텍스",
  "디큐브시티","판교","더현대 서울","더현대 대구","울산","동구","충청",
  "가산아울렛","김포아울렛","동대문아울렛","송도아울렛","가든파이브",
  "대구아울렛","대전아울렛"
];
function sortByOrder(arr) {
  return arr.slice().sort((a, b) => {
    const ia = STORE_ORDER.indexOf(a.name), ib = STORE_ORDER.indexOf(b.name);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
}
const STORES = {
  CH: sortByOrder([
    { code: "210", name: "본점" },
    { code: "400", name: "더현대 서울" },
    { code: "430", name: "중동" },
    { code: "460", name: "더현대 대구" }
  ]),
  CC: [ { code: "240", name: "부산" } ],
  GENERAL: sortByOrder([
    { code: "220", name: "무역센터" },
    { code: "260", name: "천호" },
    { code: "270", name: "신촌" },
    { code: "290", name: "울산" },
    { code: "410", name: "미아" },
    { code: "420", name: "목동" },
    { code: "450", name: "킨텍스" },
    { code: "470", name: "충청" },
    { code: "480", name: "판교" },
    { code: "750", name: "가든파이브" }
  ])
};
const CAT_NAME = { CH: "CH 1985", GENERAL: "문화센터", CC: "컬처커넥트" };
const PC_BASE = "https://www.ehyundai.com/newCulture/CT/CT010100_L.do";
const MOBILE_BASE = "https://www.ehyundai.com/mobile/culture/ct_01_01_00_01.do";

function updateStores() {
  const cat = document.getElementById("category").value;
  const sel = document.getElementById("store");
  document.getElementById("result").classList.remove("show");
  sel.innerHTML = "";
  if (!cat) {
    sel.disabled = true;
    sel.innerHTML = '<option value="">카테고리를 먼저 선택하세요</option>';
    return;
  }
  sel.disabled = false;
  if (cat === "CC") {
    const s = STORES.CC[0];
    sel.innerHTML = '<option value="' + s.code + '">' + s.name + " (" + s.code + ")</option>";
    return;
  }
  sel.innerHTML = '<option value="">선택하세요</option>';
  STORES[cat].forEach(s => {
    const o = document.createElement("option");
    o.value = s.code; o.textContent = s.name + " (" + s.code + ")";
    sel.appendChild(o);
  });
}
function buildUrl(base, cat, stCd, keyword) {
  const params = ["stCd=" + stCd];
  if (keyword) params.push("nickNm=" + encodeURIComponent(keyword));
  if (cat === "CH") params.push("ctGubn=CH");
  if (cat === "CC") params.push("ctGubn=CC");
  return base + "?" + params.join("&");
}
function generate() {
  const cat = document.getElementById("category").value;
  const stCd = document.getElementById("store").value;
  const keyword = document.getElementById("keyword").value.trim();
  if (!cat) { alert("카테고리를 선택하세요."); return; }
  if (!stCd) { alert("점을 선택하세요."); return; }

  document.getElementById("pcUrl").textContent = buildUrl(PC_BASE, cat, stCd, keyword);
  document.getElementById("mobileUrl").textContent = buildUrl(MOBILE_BASE, cat, stCd, keyword);

  const storeName = document.getElementById("store").selectedOptions[0].textContent;
  const kw = keyword ? "'" + keyword + "'" : "전체 강좌";
  document.getElementById("resultMeta").textContent = CAT_NAME[cat] + " · " + storeName + " · " + kw;
  document.getElementById("result").classList.add("show");
}
function copyUrl(id, btn) {
  const text = document.getElementById(id).textContent;
  const onDone = () => {
    btn.textContent = "복사됨 ✓"; btn.classList.add("done"); btn.disabled = true;
    setTimeout(() => { btn.textContent = "복사"; btn.classList.remove("done"); btn.disabled = false; }, 1300);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onDone).catch(() => fallbackCopy(text, onDone));
  } else { fallbackCopy(text, onDone); }
}
function openUrl(id) {
  const url = document.getElementById(id).textContent;
  if (url) window.open(url, "_blank", "noopener");
}
function resetAll() {
  document.getElementById("category").value = "";
  updateStores();
  document.getElementById("keyword").value = "";
  document.getElementById("result").classList.remove("show");
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function fallbackCopy(text, onDone) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); onDone(); }
  catch (e) { alert("복사에 실패했습니다. 링크를 직접 선택해 복사해 주세요."); }
  document.body.removeChild(ta);
}
</script>
</body>
</html>
